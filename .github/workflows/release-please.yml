name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      pr_branch: ${{ steps.release.outputs.pr && fromJSON(steps.release.outputs.pr).headBranchName || '' }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  update-lockfile:
    needs: release-please
    if: ${{ needs.release-please.outputs.pr_branch != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.pr_branch }}

      - uses: astral-sh/setup-uv@v6

      - name: Update uv.lock
        run: uv lock

      - name: Commit updated lockfile
        run: |
          if git diff --quiet uv.lock; then
            echo "uv.lock is already up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add uv.lock
            git commit -m "chore: update uv.lock"
            git push
          fi

  build-mcpb:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install MCPB CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Build bundle
        run: mcpb pack

      - name: Rename bundle with version
        run: |
          VERSION="${{ needs.release-please.outputs.tag_name }}"
          mv moodler-mcp.mcpb "moodler-mcp-${VERSION#v}.mcpb"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.release-please.outputs.tag_name }}"
          gh release upload "$VERSION" "moodler-mcp-${VERSION#v}.mcpb" --clobber
