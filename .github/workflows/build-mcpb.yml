name: Build MCPB

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install MCPB CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Build bundle
        run: mcpb pack

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUNDLE=$(ls moodler-mcp-*.mcpb)
          gh release upload "${{ github.event.release.tag_name }}" "$BUNDLE" --clobber
